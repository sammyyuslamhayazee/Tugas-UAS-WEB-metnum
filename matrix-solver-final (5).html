<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KALKULATOR GAUSS JORDAN & MATRIKS BALIKAN</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Segoe UI, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        
        .container {
            background: white;
            width: 100%;
            max-width: 900px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .2);
            margin: 20px auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            align-items: center;
        }
        
        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 16px;
        }
        
        button {
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #3498db;
            color: white;
            cursor: pointer;
        }
        
        button:hover {
            background: #2980b9;
        }
        
        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        
        .matrix-grid {
            display: grid;
            gap: 6px;
            align-items: center;
            margin-bottom: 5px;
        }
        
        .matrix-grid input {
            width: 100%;
            min-width: 0;
            text-align: center;
            padding: 10px 4px;
        }
        
        .matrix-grid .equals {
            text-align: center;
            font-weight: 600;
            font-size: 18px;
            color: #555;
        }
        
        .matrix-grid input.vector-b {
            border-color: #3498db;
            background: #eaf4fc;
            font-weight: 600;
        }
        
        #output {
            margin-top: 20px;
            background: #f7f7f7;
            padding: 15px;
            border-radius: 10px;
            overflow: auto;
        }
        
        #output h2 {
            margin-bottom: 10px;
            font-size: 18px;
        }
        
        #output p {
            margin: 4px 0;
            font-size: 15px;
        }
        
        #output p.error {
            color: #e74c3c;
            font-weight: 500;
        }
        
        .hint {
            font-size: 12px;
            color: #888;
            margin-top: 8px;
        }
        
        .step {
            margin-bottom: 18px;
            padding-bottom: 14px;
            border-bottom: 1px dashed #ddd;
        }
        
        .step:last-child {
            border-bottom: none;
        }
        
        .step-title {
            font-weight: 600;
            margin-bottom: 8px;
            color: #2c3e50;
            font-size: 14px;
        }
        
        table.step-matrix {
            border-collapse: collapse;
            font-family: 'Cascadia Code', 'Consolas', monospace;
            font-size: 13px;
        }
        
        .step-matrix-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 4px;
        }
        
        table.step-matrix td {
            border: 1px solid #ccc;
            padding: 6px 10px;
            text-align: center;
            background: white;
            min-width: 40px;
        }
        
        table.step-matrix td.sep-col {
            border-left: 2px solid #3498db;
            background: #eaf4fc;
        }
        
        .final-box {
            background: #eafaf0;
            border: 1px solid #2ecc71;
            border-radius: 8px;
            padding: 14px;
            margin-top: 10px;
        }
        
        .final-box h2 {
            margin-bottom: 8px;
            font-size: 17px;
            color: #27ae60;
        }
        
        .matrix-input-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 4px;
        }
        
        @media(max-width:768px) {
            body {
                padding: 10px;
            }
            .container {
                padding: 14px;
                border-radius: 14px;
                margin: 8px auto;
            }
            h1 {
                font-size: 20px;
            }
            .matrix-grid input {
                padding: 8px 2px;
                font-size: 13px;
                min-width: 44px;
            }
            .controls,
            .buttons {
                flex-direction: column;
            }
            .controls input,
            .buttons button,
            .controls button {
                width: 100%;
            }
            button {
                padding: 14px;
                font-size: 15px;
            }
            table.step-matrix td {
                padding: 5px 7px;
                min-width: 34px;
                font-size: 12px;
            }
            .step-title {
                font-size: 13px;
            }
            #output {
                padding: 10px;
            }
        }
        
        @media(max-width:400px) {
            .matrix-grid {
                gap: 4px;
            }
            .matrix-grid input {
                min-width: 38px;
                padding: 6px 2px;
                font-size: 12px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Sistem Persamaan Linear</h1>

        <div class="controls">
            <input type="number" id="rows" value="3" min="1" step="1">
            <button onclick="generateMatrix()">Buat Matriks</button>
        </div>
        <p class="hint">Masukkan jumlah persamaan/variabel (n). Matriks koefisien A berukuran n × n, dan vektor hasil b (n × 1) ditampilkan terpisah di sebelah kanan tanda "=".</p>

        <div class="matrix-input-wrap">
            <div id="matrixInput"></div>
        </div>

        <div class="buttons">
            <button onclick="solveGaussJordan()">Selesaikan (Gauss-Jordan)</button>
            <button onclick="solveInverse()">Selesaikan (Matriks Balikan)</button>
        </div>

        <div id="output">
            <p class="hint" style="margin:0;">Hasil akan muncul di sini setelah menekan salah satu tombol di atas.</p>
        </div>
    </div>

    <script>
        generateMatrix();

        function generateMatrix() {
            const rowsInput = document.getElementById("rows").value;
            const rows = parseInt(rowsInput);

            if (!Number.isInteger(rows) || rows <= 0) {
                document.getElementById("matrixInput").innerHTML =
                    '<p class="error">Masukkan jumlah baris (n) berupa bilangan bulat positif.</p>';
                return;
            }

            const n = rows;

            // Grid tunggal dengan n kolom untuk koefisien A, lalu 1 kolom "=",
            // lalu 1 kolom untuk vektor hasil b. Karena elemen dituliskan
            // berurutan per baris (n koefisien, "=", b), CSS Grid otomatis
            // menempatkannya baris demi baris.
            let html = `<div class="matrix-grid" style="grid-template-columns: repeat(${n}, 1fr) auto 1fr;">`;

            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n; j++) {
                    html += `<input type="number" id="cell-${i}-${j}" value="0">`;
                }
                html += '<span class="equals">=</span>';
                html += `<input type="number" class="vector-b" id="cell-${i}-${n}" value="0">`;
            }

            html += '</div>';

            document.getElementById("matrixInput").innerHTML = html;
        }

        function getMatrix() {
            const rows = parseInt(document.getElementById("rows").value);
            const cols = rows + 1;
            let matrix = [];

            for (let i = 0; i < rows; i++) {
                let row = [];
                for (let j = 0; j < cols; j++) {
                    const cell = document.getElementById(`cell-${i}-${j}`);
                    row.push(parseFloat(cell ? cell.value : 0) || 0);
                }
                matrix.push(row);
            }

            return matrix;
        }

        // Format angka biar rapi: bulatkan ke 4 desimal, hilangkan nol berlebih.
        function fmt(x) {
            if (Math.abs(x) < 1e-10) x = 0;
            const rounded = Math.round(x * 10000) / 10000;
            return rounded.toString();
        }

        // Render matriks jadi tabel HTML. sepIndex = mulai dari kolom mana
        // yang dianggap "bagian terpisah" (misal vektor b, atau matriks I pada invers).
        function renderMatrixTable(matrix, sepIndex) {
            let html = '<div class="step-matrix-wrap"><table class="step-matrix"><tbody>';
            for (const row of matrix) {
                html += '<tr>';
                row.forEach((val, j) => {
                    const cls = (sepIndex !== undefined && j === sepIndex) ? ' class="sep-col"' : '';
                    html += `<td${cls}>${fmt(val)}</td>`;
                });
                html += '</tr>';
            }
            html += '</tbody></table></div>';
            return html;
        }

        function deepCopy(A) {
            return A.map(row => row.slice());
        }

        // Gauss-Jordan generik yang dipakai baik untuk solve maupun invers.
        // A: array of rows, setiap row punya panjang n + extraCols
        // steps: array kosong yang akan diisi catatan tiap langkah { title, matrix }
        // Mengembalikan null jika matriks singular (tidak bisa direduksi).
        function gaussJordan(A, n, extraCols, steps, sepIndex) {
            const totalCols = n + extraCols;

            if (steps) {
                steps.push({
                    title: 'Matriks awal',
                    matrix: deepCopy(A)
                });
            }

            for (let i = 0; i < n; i++) {
                // Partial pivoting: cari baris dengan nilai absolut terbesar di kolom i
                let maxRow = i;
                let maxVal = Math.abs(A[i][i]);
                for (let k = i + 1; k < n; k++) {
                    if (Math.abs(A[k][i]) > maxVal) {
                        maxVal = Math.abs(A[k][i]);
                        maxRow = k;
                    }
                }

                if (maxRow !== i) {
                    [A[i], A[maxRow]] = [A[maxRow], A[i]];
                    if (steps) {
                        steps.push({
                            title: `Tukar baris R${i + 1} dengan R${maxRow + 1} (pivot lebih besar untuk stabilitas)`,
                            matrix: deepCopy(A)
                        });
                    }
                }

                const pivot = A[i][i];

                if (Math.abs(pivot) < 1e-12) {
                    return null; // matriks singular
                }

                for (let j = 0; j < totalCols; j++) {
                    A[i][j] /= pivot;
                }

                if (steps) {
                    steps.push({
                        title: `R${i + 1} = R${i + 1} ÷ ${fmt(pivot)}  (jadikan pivot kolom ${i + 1} bernilai 1)`,
                        matrix: deepCopy(A)
                    });
                }

                let didEliminate = false;
                let factorNotes = [];

                for (let k = 0; k < n; k++) {
                    if (k !== i && Math.abs(A[k][i]) > 1e-12) {
                        const factor = A[k][i];
                        factorNotes.push(`R${k + 1} = R${k + 1} − (${fmt(factor)}) × R${i + 1}`);
                        for (let j = 0; j < totalCols; j++) {
                            A[k][j] -= factor * A[i][j];
                        }
                        didEliminate = true;
                    }
                }

                if (steps && didEliminate) {
                    steps.push({
                        title: `Nolkan kolom ${i + 1} di baris lain:<br>` + factorNotes.join('<br>'),
                        matrix: deepCopy(A)
                    });
                }
            }

            return A;
        }

        function solveGaussJordan() {
            let A = getMatrix();
            let n = A.length;
            let steps = [];

            const result = gaussJordan(A, n, 1, steps, n);

            if (result === null) {
                document.getElementById("output").innerHTML =
                    '<p class="error">Matriks singular — sistem tidak punya solusi tunggal (tidak ada solusi atau solusi tak hingga).</p>' +
                    renderSteps(steps, n);
                return;
            }

            let output = "<h2>Cara Pengerjaan — Gauss-Jordan</h2>";
            output += renderSteps(steps, n);

            output += '<div class="final-box"><h2>Hasil Akhir</h2>';
            for (let i = 0; i < n; i++) {
                output += `<p>x${i + 1} = ${result[i][n].toFixed(6)}</p>`;
            }
            output += '</div>';

            document.getElementById("output").innerHTML = output;

            if (window.MathJax && MathJax.typeset) MathJax.typeset();
        }

        // Render daftar langkah (title + tabel matriks) jadi HTML
        function renderSteps(steps, sepIndex) {
            let html = "";
            steps.forEach((step, idx) => {
                html += `<div class="step"><div class="step-title">Langkah ${idx + 1}: ${step.title}</div>`;
                html += renderMatrixTable(step.matrix, sepIndex);
                html += '</div>';
            });
            return html;
        }

        function solveInverse() {
            const M = getMatrix();
            const n = M.length;

            let A = [];
            let B = [];

            for (let i = 0; i < n; i++) {
                A.push(M[i].slice(0, n));
                B.push(M[i][n]);
            }

            // Augment A dengan matriks identitas: [A | I]
            let augmented = A.map((row, i) => {
                const identityRow = new Array(n).fill(0);
                identityRow[i] = 1;
                return [...row, ...identityRow];
            });

            let steps = [];
            const result = gaussJordan(augmented, n, n, steps, n);

            if (result === null) {
                document.getElementById("output").innerHTML =
                    '<p class="error">Determinan = 0 — matriks tidak punya invers.</p>' +
                    renderSteps(steps, n);
                return;
            }

            // Ambil bagian invers (n kolom terakhir)
            const inv = result.map(row => row.slice(n, 2 * n));

            let output = "<h2>Cara Pengerjaan — Matriks Balikan</h2>";
            output += '<p class="hint" style="margin-bottom:10px;">Bentuk [A | I], lalu eliminasi Gauss-Jordan sampai bagian kiri menjadi I. Bagian kanan akan menjadi A⁻¹.</p>';
            output += renderSteps(steps, n);

            output += '<div class="step"><div class="step-title">Matriks balikan A⁻¹ (diambil dari kolom kanan hasil akhir):</div>';
            output += renderMatrixTable(inv);
            output += '</div>';

            // X = inv(A) * B, tampilkan perhitungan tiap komponen
            let X = new Array(n).fill(0);
            let multLines = [];
            for (let i = 0; i < n; i++) {
                let terms = [];
                for (let j = 0; j < n; j++) {
                    X[i] += inv[i][j] * B[j];
                    terms.push(`(${fmt(inv[i][j])})(${fmt(B[j])})`);
                }
                multLines.push(`x${i + 1} = ${terms.join(' + ')} = ${fmt(X[i])}`);
            }

            output += '<div class="step"><div class="step-title">Hitung X = A⁻¹ × b:</div><p style="font-family:monospace; font-size:13px; line-height:1.8;">' +
                multLines.join('<br>') + '</p></div>';

            output += '<div class="final-box"><h2>Hasil Akhir</h2>';
            for (let i = 0; i < n; i++) {
                output += `<p>x${i + 1} = ${X[i].toFixed(6)}</p>`;
            }
            output += '</div>';

            document.getElementById("output").innerHTML = output;

            if (window.MathJax && MathJax.typeset) MathJax.typeset();
        }
    </script>

</body>

</html>
